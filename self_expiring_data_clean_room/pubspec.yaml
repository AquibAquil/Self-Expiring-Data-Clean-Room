publish_to: none
version: 0.1.0

environment:
  sdk: ^3.4.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  at_client_flutter: ^1.1.3
  at_client: ^3.11.0
  at_commons: ^5.0.0
  at_auth: ^3.0.0
  path_provider: ^2.1.4
  url_launcher: ^6.3.0
  file_picker: ^11.0.2
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
